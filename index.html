<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Operator | CodeInBlack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-app: #131314; --bg-surface: #1c1c1e; --bg-surface-hover: #28282b;
            --text-primary: #ffffff; --text-secondary: #8e8e93;
            --accent-lilac: #b4b2ff; --accent-yellow: #ffd026; --accent-green: #32d74b; --accent-danger: #ff453a; --accent-blue: #0a84ff;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-lg: 24px; --radius-md: 16px;
            --font-main: 'Inter', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-app); color: var(--text-primary); font-family: var(--font-main); -webkit-font-smoothing: antialiased; padding-bottom: 80px; }

        .topbar { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; background: rgba(19, 19, 20, 0.9); backdrop-filter: blur(12px); }
        .brand { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--accent-lilac); }
        .status-pill { background: var(--bg-surface); padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: 500; border: 1px solid var(--border-color); }

        .container { max-width: 500px; margin: 40px auto; padding: 0 20px; }
        .hide { display: none !important; }

        .panel { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 24px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        h2 { font-size: 24px; font-weight: 600; margin-bottom: 24px; }
        
        input[type="text"], textarea { width: 100%; background: var(--bg-app); border: 1px solid var(--border-color); color: var(--text-primary); padding: 16px; border-radius: var(--radius-md); font-size: 15px; outline: none; margin-bottom: 16px; }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent-lilac); }

        .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--accent-green); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn-danger { background: rgba(255, 69, 58, 0.1); border: 1px solid rgba(255, 69, 58, 0.3); color: var(--accent-danger); }
        .btn-sms { background: var(--accent-blue); color: #fff; }
        
        .lead-header { display: flex; justify-content: space-between; align-items: center; }
        .lead-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .lead-phone { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        
        .call-btn { width: 54px; height: 54px; background: var(--text-primary); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; text-decoration: none; box-shadow: 0 4px 12px rgba(255,255,255,0.2); }
        .log-btn { width: 44px; height: 44px; background: var(--bg-surface-hover); color: var(--text-primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; border: 1px solid var(--border-color); cursor: pointer; }
        .sms-btn { width: 44px; height: 44px; background: rgba(10, 132, 255, 0.1); color: var(--accent-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; border: 1px solid rgba(10, 132, 255, 0.3); cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: var(--bg-surface); padding: 32px; border-radius: var(--radius-lg); width: 90%; max-width: 400px; border: 1px solid var(--border-color); }
        
        .check-result-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 16px; font-size: 14px; }
        .check-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .check-val { font-weight: 600; color: var(--accent-lilac); }

        #toastContainer { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; }
        .toast { background: var(--bg-surface-hover); color: var(--text-primary); padding: 14px 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border-color); animation: slideUp 0.3s; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="brand"><i class="bi bi-terminal-fill"></i> CodeInBlack</div>
        <div id="agentStatus" class="status-pill">Offline</div>
    </div>

    <div id="loginSection" class="container">
        <div class="panel">
            <h2>Authentication</h2>
            <input type="text" id="agentNameInput" placeholder="Enter your name...">
            <button onclick="login()" id="loginBtn" class="btn btn-primary" style="background: var(--accent-lilac);">Initialize Session</button>
        </div>
    </div>

    <div id="leadsSection" class="container hide">
        <h2 style="margin-bottom: 12px;">Active US Queue (<span id="leadCount">0</span>)</h2>
        <div id="leadsContainer"></div>
    </div>

    <!-- Feedback Modal -->
    <div id="feedbackModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-bottom: 16px;">Log Call Outcome</h3>
            <div id="feedbackLeadBiz" style="font-size: 20px; font-weight: 700; margin-bottom: 6px;"></div>
            <textarea id="feedbackNotes" placeholder="Notes..."></textarea>
            <input type="hidden" id="feedbackLeadId">
            <div style="display: grid; gap: 12px; margin-top: 16px;">
                <button onclick="submitModalFeedback('interested')" class="btn btn-primary"><i class="bi bi-star-fill"></i> Interested</button>
                <button onclick="submitModalFeedback('callback')" class="btn btn-outline" style="color: var(--accent-blue);"><i class="bi bi-telephone-forward-fill"></i> Callback</button>
                <button onclick="submitModalFeedback('not_interested')" class="btn btn-danger"><i class="bi bi-x-circle-fill"></i> Rejected</button>
            </div>
            <button onclick="closeFeedbackModal()" class="btn btn-outline" style="margin-top: 16px; padding: 10px;">Cancel</button>
        </div>
    </div>

    <!-- SMS & Checker Modal -->
    <div id="smsModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-bottom: 16px;">Verify & SMS</h3>
            <input type="hidden" id="smsLeadId">
            <input type="hidden" id="smsPhone">
            
            <div id="checkResult" class="check-result-box">
                <div class="check-row"><span>Status:</span> <span id="resStatus" class="check-val">Checking...</span></div>
                <div class="check-row"><span>Type:</span> <span id="resType" class="check-val">...</span></div>
                <div class="check-row"><span>Carrier:</span> <span id="resCarrier" class="check-val">...</span></div>
            </div>

            <div id="smsInputArea" style="display: none;">
                <textarea id="smsMessageBody" placeholder="Type SMS message..."></textarea>
                <button onclick="sendOperatorSMS()" id="sendSmsBtn" class="btn btn-sms"><i class="bi bi-send"></i> Send SMS</button>
            </div>
            <button onclick="closeSmsModal()" class="btn btn-outline" style="margin-top: 16px; padding: 10px;">Close</button>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        const supabaseUrl = 'https://rmfubnduytozikcgzvok.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZnVibmR1eXRvemlrY2d6dm9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTIyMDgsImV4cCI6MjA5NzI2ODIwOH0.XmxDD8mH8rgq3OZmD7jVophtH2W3NNDgSRJKC3RXvJU';
        const dbClient = supabase.createClient(supabaseUrl, supabaseKey);
        const VERIPHONE_KEY = '22F67D281418466EB21FC65D8EE4193D';

        let currentAgentId = null;
        let currentSmsGateway = null;
        let currentLeads = [];

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        async function login() {
            const agentName = document.getElementById('agentNameInput').value.trim();
            if (!agentName) return;
            
            const { data } = await dbClient.from('agents').select('id').ilike('name', agentName).maybeSingle();
            if (data) currentAgentId = data.id;
            else {
                const { data: newA } = await dbClient.from('agents').insert([{ name: agentName }]).select().single();
                currentAgentId = newA.id;
            }
            
            document.getElementById('agentStatus').innerHTML = `<span style="color:var(--accent-green)">●</span> ${agentName}`;
            document.getElementById('loginSection').classList.add('hide');
            document.getElementById('leadsSection').classList.remove('hide');
            loadLeads();
        }

        async function loadLeads() {
            const { data } = await dbClient.from('leads').select('*').eq('agent_id', currentAgentId).eq('status', 'pending').order('created_at', { ascending: false });
            currentLeads = data || [];
            document.getElementById('leadCount').innerText = currentLeads.length;

            document.getElementById('leadsContainer').innerHTML = currentLeads.map(lead => {
                const safeName = lead.business_name.replace(/'/g, "\\'");
                // Rebtel Deep Link implementation
                const rebtelLink = `rebtel://call?number=${lead.phone_number}`;
                
                return `
                <div class="panel" id="lead-${lead.id}">
                    <div class="lead-header">
                        <div style="flex: 1;">
                            <div class="lead-title">${lead.business_name}</div>
                            <div class="lead-phone"><i class="bi bi-telephone"></i> ${lead.phone_number}</div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button onclick="openSmsModal('${lead.id}', '${lead.phone_number}')" class="sms-btn" title="Verify & SMS"><i class="bi bi-chat-text"></i></button>
                            <button onclick="openFeedbackModal('${lead.id}', '${safeName}')" class="log-btn" title="Log Outcome"><i class="bi bi-card-checklist"></i></button>
                            <a href="${rebtelLink}" onclick="markCalled('${lead.id}')" class="call-btn" title="Call via Rebtel"><i class="bi bi-telephone-outbound-fill"></i></a>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function markCalled(id) { dbClient.from('leads').update({ called_at: new Date().toISOString() }).eq('id', id).then(); }

        // Feedback Logic
        function openFeedbackModal(id, name) {
            document.getElementById('feedbackLeadId').value = id;
            document.getElementById('feedbackLeadBiz').innerText = name;
            document.getElementById('feedbackNotes').value = '';
            document.getElementById('feedbackModal').classList.add('active');
        }
        function closeFeedbackModal() { document.getElementById('feedbackModal').classList.remove('active'); }

        async function submitModalFeedback(status) {
            const id = document.getElementById('feedbackLeadId').value;
            const notes = document.getElementById('feedbackNotes').value;
            await dbClient.from('leads').update({ status, notes, called_at: new Date().toISOString() }).eq('id', id);
            closeFeedbackModal();
            loadLeads();
            showToast('Logged successfully.');
        }

        // SMS & Checker Logic
        function getSmsGateway(carrier) {
            if(!carrier) return null;
            const c = carrier.toLowerCase();
            if(c.includes('at&t') || c.includes('att')) return 'txt.att.net';
            if(c.includes('verizon')) return 'vtext.com';
            if(c.includes('t-mobile') || c.includes('tmobile')) return 'tmomail.net';
            if(c.includes('sprint')) return 'messaging.sprintpcs.com';
            if(c.includes('boost')) return 'sms.myboostmobile.com';
            if(c.includes('cricket')) return 'mms.cricketwireless.net';
            if(c.includes('us cellular')) return 'email.uscc.net';
            return null;
        }

        async function openSmsModal(id, phone) {
            document.getElementById('smsLeadId').value = id;
            document.getElementById('smsPhone').value = phone;
            document.getElementById('smsInputArea').style.display = 'none';
            document.getElementById('resStatus').innerText = 'Checking...';
            document.getElementById('resType').innerText = '...';
            document.getElementById('resCarrier').innerText = '...';
            document.getElementById('smsModal').classList.add('active');

            try {
                const res = await fetch(`https://api.veriphone.io/v2/verify?key=${VERIPHONE_KEY}&phone=${encodeURIComponent(phone)}`);
                const data = await res.json();

                if(!data.phone_valid) {
                    document.getElementById('resStatus').innerText = "Invalid Number";
                    return;
                }

                const type = data.phone_type || "Unknown";
                const carrier = data.carrier || "Unknown";

                document.getElementById('resStatus').innerText = "Valid";
                document.getElementById('resType').innerText = type;
                document.getElementById('resCarrier').innerText = carrier;

                // Cache in DB notes
                const lead = currentLeads.find(l => l.id === id);
                const prefix = `[${type}] [${carrier}] `;
                if(lead && (!lead.notes || !lead.notes.includes(prefix))) {
                    await dbClient.from('leads').update({ notes: prefix + (lead.notes||'') }).eq('id', id);
                }

                currentSmsGateway = getSmsGateway(carrier);
                if(type.toLowerCase().includes('mobile') && currentSmsGateway) {
                    document.getElementById('smsInputArea').style.display = 'block';
                }

            } catch(e) { document.getElementById('resStatus').innerText = "API Error"; }
        }

        function closeSmsModal() { document.getElementById('smsModal').classList.remove('active'); }

        async function sendOperatorSMS() {
            const apiKey = localStorage.getItem('resend_api_key');
            const fromEmail = localStorage.getItem('resend_from_email');
            
            if(!apiKey || !fromEmail) {
                return showToast("Admin has not configured Resend Settings on this device.");
            }

            const phone = document.getElementById('smsPhone').value.replace(/\D/g, '');
            const tenDigit = phone.length === 11 ? phone.substring(1) : phone;
            const toEmail = `${tenDigit}@${currentSmsGateway}`;
            const msg = document.getElementById('smsMessageBody').value.trim();

            if(!msg) return showToast("Enter a message.");

            document.getElementById('sendSmsBtn').innerText = 'Sending...';
            try {
                const response = await fetch('https://corsproxy.io/?https://api.resend.com/emails', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: fromEmail, to: toEmail, subject: 'Alert', text: msg })
                });

                if(!response.ok) throw new Error();
                showToast("SMS Sent!");
                closeSmsModal();
            } catch(e) { showToast("Error sending SMS."); }
            finally { document.getElementById('sendSmsBtn').innerHTML = '<i class="bi bi-send"></i> Send SMS'; }
        }
    </script>
</body>
</html>
