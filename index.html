<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Operator | CodeInBlack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-app: #131314; --bg-surface: #1c1c1e; --bg-surface-hover: #28282b;
            --text-primary: #ffffff; --text-secondary: #8e8e93;
            --accent-lilac: #b4b2ff; --accent-yellow: #ffd026; --accent-green: #32d74b; --accent-danger: #ff453a; --accent-blue: #0a84ff;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-lg: 24px; --radius-md: 16px;
            --font-main: 'Inter', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-app); color: var(--text-primary); font-family: var(--font-main); -webkit-font-smoothing: antialiased; padding-bottom: 80px; }

        .topbar { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; background: rgba(19, 19, 20, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .brand { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; letter-spacing: -0.02em; }
        .status-group { display: flex; align-items: center; gap: 12px; }
        .status-pill { background: var(--bg-surface); padding: 6px 12px; border-radius: 99px; font-size: 12px; font-weight: 500; border: 1px solid var(--border-color); }
        .logout-btn { background: transparent; color: var(--text-secondary); border: none; font-size: 18px; cursor: pointer; transition: 0.2s; display: none; }
        .logout-btn:hover { color: var(--accent-danger); }

        .container { max-width: 500px; margin: 40px auto; padding: 0 20px; }
        .hide { display: none !important; }

        .panel { background: var(--bg-surface); border-radius: var(--radius-lg); padding: 24px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); border: 1px solid var(--border-color); margin-bottom: 20px; transition: opacity 0.3s ease; }
        h2 { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 24px; }
        
        input[type="text"], textarea { width: 100%; background: var(--bg-app); border: 1px solid var(--border-color); color: var(--text-primary); padding: 16px; border-radius: var(--radius-md); font-size: 15px; outline: none; font-family: var(--font-main); margin-bottom: 16px; transition: border-color 0.2s; }
        input[type="text"]:focus, textarea:focus { border-color: var(--accent-lilac); }
        textarea { resize: vertical; min-height: 80px; margin-bottom: 0; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: var(--radius-md); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--accent-green); color: #000; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn-danger { background: rgba(255, 69, 58, 0.1); border: 1px solid rgba(255, 69, 58, 0.3); color: var(--accent-danger); }
        .btn-sms { background: var(--accent-blue); color: #fff; }
        
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }

        .lead-header { display: flex; justify-content: space-between; align-items: center; }
        .lead-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; line-height: 1.3; }
        .lead-phone { color: var(--text-secondary); font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        
        .call-btn { width: 54px; height: 54px; background: var(--text-primary); color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; text-decoration: none; transition: 0.2s; flex-shrink: 0; box-shadow: 0 4px 12px rgba(255,255,255,0.2); }
        .call-btn:active { transform: scale(0.9); }
        
        .log-btn { width: 54px; height: 54px; background: var(--bg-surface-hover); color: var(--text-primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .log-btn:active { transform: scale(0.9); }

        .sms-btn { width: 54px; height: 54px; background: rgba(10, 132, 255, 0.1); color: var(--accent-blue); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; border: 1px solid rgba(10, 132, 255, 0.3); cursor: pointer; transition: 0.2s; flex-shrink: 0; }
        .sms-btn:active { transform: scale(0.9); }

        .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .queue-count { background: var(--accent-yellow); color: #000; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 700; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }

        /* Floating Callback Button */
        .fab { position: fixed; bottom: 24px; right: 24px; width: 64px; height: 64px; border-radius: 50%; background: var(--accent-blue); color: #fff; display: flex; justify-content: center; align-items: center; font-size: 26px; border: none; box-shadow: 0 8px 24px rgba(10, 132, 255, 0.4); cursor: pointer; z-index: 100; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }
        .fab-badge { position: absolute; top: 0; right: 0; background: var(--accent-danger); color: white; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 12px; border: 2px solid var(--bg-app); }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 999; display: flex; justify-content: center; align-items: flex-end; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        /* Bottom Sheet for Callbacks */
        .modal-content { background: var(--bg-app); width: 100%; max-width: 600px; height: 85vh; border-radius: 24px 24px 0 0; padding: 24px; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        /* Centered Box for Feedback Action / SMS */
        .modal-box { background: var(--bg-surface); padding: 32px; border-radius: var(--radius-lg); width: 90%; max-width: 400px; border: 1px solid var(--border-color); transform: translateY(20px); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1); margin: auto; box-shadow: 0 24px 48px rgba(0,0,0,0.6); }
        .modal-overlay.active .modal-box { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: var(--bg-surface-hover); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .callbacks-list { flex: 1; overflow-y: auto; padding-right: 8px; }

        .check-result-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 16px; font-size: 14px; }
        .check-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .check-val { font-weight: 600; color: var(--accent-lilac); }

        /* Custom Toast */
        #toastContainer { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: var(--bg-surface-hover); color: var(--text-primary); padding: 14px 20px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); font-size: 14px; font-weight: 500; border: 1px solid var(--border-color); animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); text-align: center; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="brand"><i class="bi bi-terminal-fill" style="color: var(--accent-lilac);"></i> CodeInBlack</div>
        <div class="status-group">
            <div id="agentStatus" class="status-pill">Offline</div>
            <button id="logoutBtn" class="logout-btn" onclick="logout()" title="Logout"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </div>

    <div id="loginSection" class="container">
        <div class="panel">
            <h2>Authentication</h2>
            <input type="text" id="agentNameInput" placeholder="Enter your name..." autocomplete="off">
            <button onclick="login()" id="loginBtn" class="btn btn-primary" style="background: var(--accent-lilac);">Initialize Session <i class="bi bi-arrow-right"></i></button>
        </div>
    </div>

    <div id="leadsSection" class="container hide">
        <div class="queue-header">
            <h2 style="margin:0;">Active Queue</h2>
            <span id="leadCount" class="queue-count">0</span>
        </div>
        <div id="leadsContainer"></div>
    </div>

    <button id="fabBtn" class="fab hide" onclick="openCallbacks()">
        <i class="bi bi-telephone-forward"></i>
        <span id="fabBadge" class="fab-badge hide">0</span>
    </button>

    <!-- Callbacks List Modal -->
    <div id="callbacksModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin:0;">Scheduled Callbacks</h2>
                <button class="close-btn" onclick="closeCallbacks()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div id="callbacksList" class="callbacks-list"></div>
        </div>
    </div>

    <!-- Mandatory Feedback Action Modal -->
    <div id="feedbackModal" class="modal-overlay" style="align-items: center;">
        <div class="modal-box">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                <h3 style="color: var(--text-secondary); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Log Call Outcome</h3>
                <button class="close-btn" onclick="closeFeedbackModal()" style="width: 28px; height: 28px; font-size: 12px;"><i class="bi bi-x-lg"></i></button>
            </div>
            
            <div id="feedbackLeadBiz" style="font-size: 22px; font-weight: 700; margin-bottom: 6px; line-height: 1.2;"></div>
            <div id="feedbackLeadPhone" style="color: var(--accent-lilac); font-size: 15px; font-weight: 500; margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                <i class="bi bi-telephone-fill"></i> <span></span>
            </div>
            
            <textarea id="feedbackNotes" placeholder="Add notes here (Optional)..." style="min-height: 100px; margin-bottom: 24px; background: rgba(0,0,0,0.2);"></textarea>
            
            <input type="hidden" id="feedbackLeadId">
            <input type="hidden" id="feedbackIsCallback">

            <div class="action-grid" style="margin-top: 0;">
                <button onclick="submitModalFeedback('interested')" class="btn btn-primary">
                    <i class="bi bi-star-fill"></i> Interested
                </button>
                <button onclick="submitModalFeedback('callback')" class="btn btn-outline" style="border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(10, 132, 255, 0.05);">
                    <i class="bi bi-telephone-forward-fill"></i> Needs Callback
                </button>
                <button onclick="submitModalFeedback('not_interested')" class="btn btn-danger">
                    <i class="bi bi-x-circle-fill"></i> Rejected / Not Interested
                </button>
            </div>
        </div>
    </div>

    <!-- SMS & Checker Modal -->
    <div id="smsModal" class="modal-overlay" style="align-items: center;">
        <div class="modal-box">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
                <h3 style="color: var(--text-secondary); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Verify & SMS</h3>
                <button class="close-btn" onclick="closeSmsModal()" style="width: 28px; height: 28px; font-size: 12px;"><i class="bi bi-x-lg"></i></button>
            </div>
            
            <input type="hidden" id="smsLeadId">
            <input type="hidden" id="smsPhone">
            
            <div id="checkResult" class="check-result-box">
                <div class="check-row"><span>Status:</span> <span id="resStatus" class="check-val">Checking...</span></div>
                <div class="check-row"><span>Type:</span> <span id="resType" class="check-val">...</span></div>
                <div class="check-row"><span>Carrier:</span> <span id="resCarrier" class="check-val">...</span></div>
            </div>

            <div id="smsInputArea" style="display: none;">
                <textarea id="smsMessageBody" placeholder="Type SMS message..."></textarea>
                <button onclick="sendOperatorSMS()" id="sendSmsBtn" class="btn btn-sms"><i class="bi bi-send"></i> Send SMS</button>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script>
        const supabaseUrl = 'https://rmfubnduytozikcgzvok.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtZnVibmR1eXRvemlrY2d6dm9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTIyMDgsImV4cCI6MjA5NzI2ODIwOH0.XmxDD8mH8rgq3OZmD7jVophtH2W3NNDgSRJKC3RXvJU';
        const dbClient = supabase.createClient(supabaseUrl, supabaseKey);
        const VERIPHONE_KEY = '22F67D281418466EB21FC65D8EE4193D';

        let currentAgentId = null;
        let currentAgentName = null;
        let currentSmsGateway = null;
        let currentLeads = [];

        // SAFE STORAGE WRAPPER
        const safeStorage = {
            memory: {},
            get: function(key) {
                try { return window.localStorage.getItem(key) || this.memory[key] || null; }
                catch(e) { return this.memory[key] || null; }
            },
            set: function(key, val) {
                try { window.localStorage.setItem(key, val); }
                catch(e) { this.memory[key] = val; }
            },
            remove: function(key) {
                try { window.localStorage.removeItem(key); }
                catch(e) { delete this.memory[key]; }
            }
        };

        function formatDate(dateString) {
            try {
                return new Date(dateString).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
            } catch(e) {
                let d = new Date(dateString);
                let mins = d.getMinutes();
                return d.getDate() + '/' + (d.getMonth() + 1) + ' ' + d.getHours() + ':' + (mins < 10 ? '0'+mins : mins);
            }
        }

        function showToast(msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        document.getElementById('agentNameInput').addEventListener('keypress', e => { 
            if (e.key === 'Enter' || e.keyCode === 13) login(); 
        });

        document.addEventListener("DOMContentLoaded", () => {
            const savedId = safeStorage.get('cib_agent_id');
            const savedName = safeStorage.get('cib_agent_name');
            if (savedId && savedName) {
                currentAgentId = savedId;
                currentAgentName = savedName;
                finalizeLogin();
            }
        });

        async function login() {
            const agentName = document.getElementById('agentNameInput').value.trim();
            if (!agentName) return showToast('Enter your name.');
            
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation: spin 1s linear infinite;"></i> Connecting...';
            btn.disabled = true;

            try {
                const { data: existing } = await dbClient.from('agents').select('id, name').ilike('name', agentName).maybeSingle();
                if (existing) currentAgentId = existing.id;
                else {
                    const { data: newA } = await dbClient.from('agents').insert([{ name: agentName }]).select().single();
                    currentAgentId = newA.id;
                }
                
                currentAgentName = agentName;
                safeStorage.set('cib_agent_id', currentAgentId);
                safeStorage.set('cib_agent_name', currentAgentName);
                
                finalizeLogin();
            } catch(err) { 
                showToast("Failed: " + err.message); 
                btn.innerHTML = 'Initialize Session <i class="bi bi-arrow-right"></i>'; 
                btn.disabled = false; 
            }
        }

        async function finalizeLogin() {
            await dbClient.from('agents').update({ is_online: true }).eq('id', currentAgentId);
            
            document.getElementById('agentStatus').innerHTML = `<span style="color:var(--accent-green)">●</span> ${currentAgentName}`;
            document.getElementById('loginSection').classList.add('hide');
            document.getElementById('leadsSection').classList.remove('hide');
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('fabBtn').classList.remove('hide');
            
            loadLeads();
            loadCallbacks();
        }

        async function logout() {
            if (currentAgentId) await dbClient.from('agents').update({ is_online: false }).eq('id', currentAgentId);
            safeStorage.remove('cib_agent_id');
            safeStorage.remove('cib_agent_name');
            location.reload();
        }

        async function loadLeads() {
            const { data } = await dbClient.from('leads').select('*').eq('agent_id', currentAgentId).eq('status', 'pending').order('created_at', { ascending: false });
            currentLeads = data || [];
            const container = document.getElementById('leadsContainer');
            document.getElementById('leadCount').innerText = currentLeads.length;

            if (currentLeads.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="bi bi-check2-circle" style="font-size: 32px; margin-bottom: 16px; display: block;"></i><p>Queue is empty. Great job!</p></div>`;
                return;
            }

            container.innerHTML = currentLeads.map(lead => {
                const safeName = lead.business_name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const rebtelLink = `rebtel://call?number=${lead.phone_number}`;
                return `
                <div class="panel" id="lead-${lead.id}">
                    <div class="lead-header">
                        <div style="flex: 1; padding-right: 12px;">
                            <div class="lead-title">${lead.business_name}</div>
                            <div class="lead-phone"><i class="bi bi-telephone"></i> ${lead.phone_number}</div>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button onclick="openSmsModal('${lead.id}', '${lead.phone_number}')" class="sms-btn" title="Verify & SMS"><i class="bi bi-chat-text"></i></button>
                            <button onclick="openFeedbackModal('${lead.id}', '${safeName}', '${lead.phone_number}', false)" class="log-btn" title="Log Outcome Manually"><i class="bi bi-card-checklist"></i></button>
                            <a href="${rebtelLink}" onclick="handleCallClick('${lead.id}', '${safeName}', '${lead.phone_number}', false)" class="call-btn" title="Call via Rebtel"><i class="bi bi-telephone-outbound-fill"></i></a>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        async function loadCallbacks() {
            const { data } = await dbClient.from('leads').select('*').eq('agent_id', currentAgentId).eq('status', 'callback').order('updated_at', { ascending: false });
            const list = document.getElementById('callbacksList');
            const badge = document.getElementById('fabBadge');

            if (data && data.length > 0) {
                badge.innerText = data.length;
                badge.classList.remove('hide');
                list.innerHTML = data.map(lead => {
                    const safeName = lead.business_name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const rebtelLink = `rebtel://call?number=${lead.phone_number}`;
                    return `
                    <div class="panel" style="padding: 20px; margin-bottom: 16px; border-color: rgba(10, 132, 255, 0.3);" id="cb-${lead.id}">
                        <div class="lead-header" style="margin-bottom: 12px;">
                            <div style="flex: 1; padding-right: 12px;">
                                <div class="lead-title" style="font-size: 16px;">${lead.business_name}</div>
                                <div class="lead-phone" style="font-size: 13px;"><i class="bi bi-telephone"></i> ${lead.phone_number}</div>
                                <div style="font-size: 11px; color: var(--text-secondary); margin-top: 6px;">Marked: ${formatDate(lead.updated_at || lead.created_at)}</div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button onclick="openSmsModal('${lead.id}', '${lead.phone_number}')" class="sms-btn" style="width: 46px; height: 46px; font-size: 16px;"><i class="bi bi-chat-text"></i></button>
                                <button onclick="openFeedbackModal('${lead.id}', '${safeName}', '${lead.phone_number}', true)" class="log-btn" style="width: 46px; height: 46px; font-size: 16px;"><i class="bi bi-card-checklist"></i></button>
                                <a href="${rebtelLink}" onclick="handleCallClick('${lead.id}', '${safeName}', '${lead.phone_number}', true)" class="call-btn" style="width: 46px; height: 46px; font-size: 18px;"><i class="bi bi-telephone-outbound-fill"></i></a>
                            </div>
                        </div>
                        ${lead.notes ? `<div style="font-size: 13px; color: var(--text-secondary); background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; line-height: 1.5;">${lead.notes}</div>` : ''}
                    </div>
                `}).join('');
            } else {
                badge.classList.add('hide');
                list.innerHTML = `<div class="empty-state"><i class="bi bi-inbox" style="font-size: 32px; margin-bottom: 16px; display: block;"></i><p>No scheduled callbacks.</p></div>`;
            }
        }

        // Action Handlers
        async function handleCallClick(leadId, bizName, phone, isCallback) {
            // 1. Copy to clipboard
            try {
                await navigator.clipboard.writeText(phone);
                showToast('Number copied to clipboard! 📋');
            } catch (err) {
                console.warn('Clipboard copy failed', err);
            }

            // 2. Update called_at in the background immediately
            dbClient.from('leads').update({ called_at: new Date().toISOString() }).eq('id', leadId).then();
            
            // 3. Give the OS 1 second to open the phone dialer, then show the mandatory popup
            setTimeout(() => {
                openFeedbackModal(leadId, bizName, phone, isCallback);
            }, 1000);
        }

        function openFeedbackModal(leadId, bizName, phone, isCallback) {
            document.getElementById('feedbackLeadId').value = leadId;
            document.getElementById('feedbackIsCallback').value = isCallback ? 'true' : 'false';
            document.getElementById('feedbackLeadBiz').innerText = bizName;
            document.getElementById('feedbackLeadPhone').querySelector('span').innerText = phone;
            document.getElementById('feedbackNotes').value = ''; 
            
            // If they opened it from the Callbacks modal, we might want to close the Callbacks modal so it doesn't double stack, 
            // but z-index handles it fine. Let's just show it.
            document.getElementById('feedbackModal').classList.add('active');
        }

        function closeFeedbackModal() {
            document.getElementById('feedbackModal').classList.remove('active');
        }

        async function submitModalFeedback(status) {
            const leadId = document.getElementById('feedbackLeadId').value;
            const isCallback = document.getElementById('feedbackIsCallback').value === 'true';
            const newNotes = document.getElementById('feedbackNotes').value.trim();
            
            const cardId = isCallback ? `cb-${leadId}` : `lead-${leadId}`;
            const card = document.getElementById(cardId);
            if(card) { card.style.opacity = '0.4'; card.style.pointerEvents = 'none'; }

            // Close modal immediately for smooth UI feel
            closeFeedbackModal();

            try {
                let finalNotes = newNotes;

                // If updating an existing callback, append the notes instead of overwriting
                if (isCallback && newNotes) {
                    const { data } = await dbClient.from('leads').select('notes').eq('id', leadId).single();
                    let existingNotes = data.notes || '';
                    finalNotes = existingNotes ? `${existingNotes}\n[Update]: ${newNotes}` : newNotes;
                }

                const updatePayload = { status: status, called_at: new Date().toISOString() };
                if (finalNotes) updatePayload.notes = finalNotes;

                await dbClient.from('leads').update(updatePayload).eq('id', leadId);
                
                if (status === 'callback') showToast('Saved to Callbacks.');
                else if (status === 'interested') showToast('Marked as Interested! 🎉');
                else showToast('Lead logged successfully.');
                
                loadLeads();
                loadCallbacks();
            } catch(err) { 
                showToast("Error: " + err.message); 
                loadLeads(); 
                loadCallbacks(); 
            }
        }

        function openCallbacks() { document.getElementById('callbacksModal').classList.add('active'); loadCallbacks(); }
        function closeCallbacks() { document.getElementById('callbacksModal').classList.remove('active'); }

        // --- SMS & CHECKER LOGIC ---
        function getSmsGateway(carrier) {
            if(!carrier) return null;
            const c = carrier.toLowerCase();
            if(c.includes('at&t') || c.includes('att') || c.includes('cingular')) return 'txt.att.net';
            if(c.includes('verizon')) return 'vtext.com';
            if(c.includes('t-mobile') || c.includes('tmobile')) return 'tmomail.net';
            if(c.includes('sprint')) return 'messaging.sprintpcs.com';
            if(c.includes('boost')) return 'sms.myboostmobile.com';
            if(c.includes('cricket')) return 'mms.cricketwireless.net';
            if(c.includes('us cellular') || c.includes('u.s. cellular')) return 'email.uscc.net';
            if(c.includes('metro')) return 'mymetropcs.com';
            if(c.includes('tracfone')) return 'mmst5.tracfone.com';
            if(c.includes('virgin')) return 'vmobl.com';
            return null;
        }

        async function openSmsModal(id, phone) {
            document.getElementById('smsLeadId').value = id;
            document.getElementById('smsPhone').value = phone;
            document.getElementById('smsInputArea').style.display = 'none';
            document.getElementById('resStatus').innerText = 'Checking...';
            document.getElementById('resStatus').style.color = "var(--accent-lilac)";
            document.getElementById('resType').innerText = '...';
            document.getElementById('resCarrier').innerText = '...';
            document.getElementById('smsModal').classList.add('active');

            try {
                const res = await fetch(`https://api.veriphone.io/v2/verify?key=${VERIPHONE_KEY}&phone=${encodeURIComponent(phone)}`);
                const data = await res.json();

                if(!data.phone_valid) {
                    document.getElementById('resStatus').innerText = "Invalid Number";
                    document.getElementById('resStatus').style.color = "var(--accent-danger)";
                    return;
                }

                const type = data.phone_type || "Unknown";
                const carrier = data.carrier || "Unknown";

                document.getElementById('resStatus').innerText = "Valid";
                document.getElementById('resStatus').style.color = "var(--accent-green)";
                document.getElementById('resType').innerText = type;
                document.getElementById('resCarrier').innerText = carrier;

                // Cache in DB notes
                const prefix = `[${type}] [${carrier}] `;
                const { data: dbLead } = await dbClient.from('leads').select('notes').eq('id', id).single();
                if(dbLead && (!dbLead.notes || !dbLead.notes.includes(prefix))) {
                    await dbClient.from('leads').update({ notes: prefix + (dbLead.notes||'') }).eq('id', id);
                }

                currentSmsGateway = getSmsGateway(carrier);
                if(type.toLowerCase().includes('mobile') && currentSmsGateway) {
                    document.getElementById('smsInputArea').style.display = 'block';
                }

            } catch(e) { 
                document.getElementById('resStatus').innerText = "API Error"; 
                document.getElementById('resStatus').style.color = "var(--accent-danger)";
            }
        }

        function closeSmsModal() { document.getElementById('smsModal').classList.remove('active'); }

        async function sendOperatorSMS() {
            const apiKey = localStorage.getItem('resend_api_key');
            const fromEmail = localStorage.getItem('resend_from_email');
            
            if(!apiKey || !fromEmail) {
                return showToast("Admin has not configured Resend Settings on this device.");
            }

            const phone = document.getElementById('smsPhone').value.replace(/\D/g, '');
            const tenDigit = phone.length === 11 ? phone.substring(1) : phone;
            const toEmail = `${tenDigit}@${currentSmsGateway}`;
            const msg = document.getElementById('smsMessageBody').value.trim();
            const btn = document.getElementById('sendSmsBtn');

            if(!msg) return showToast("Enter a message.");

            btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation: spin 1s linear infinite;"></i> Sending...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/resend/emails', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ from: fromEmail, to: toEmail, subject: 'Alert', text: msg })
                });

                if(!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.message || "Failed to send");
                }
                
                showToast("SMS Sent!");
                document.getElementById('smsMessageBody').value = '';
                closeSmsModal();
            } catch(e) { 
                console.error(e);
                showToast("Error sending SMS: " + e.message); 
            } finally { 
                btn.innerHTML = '<i class="bi bi-send"></i> Send SMS'; 
                btn.disabled = false;
            }
        }

        // Mobile Unload Fallbacks
        const handleOffline = async () => {
            if (currentAgentId) await dbClient.from('agents').update({ is_online: false }).eq('id', currentAgentId);
        };
        window.addEventListener('beforeunload', handleOffline);
        window.addEventListener('pagehide', handleOffline);
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') handleOffline(); });

        try {
            dbClient.channel('operator-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'leads' }, payload => {
                    if(payload.new.agent_id === currentAgentId) loadLeads();
                })
                .subscribe();
        } catch (e) { console.warn("Realtime updates not supported on this device."); }
    </script>
</body>
